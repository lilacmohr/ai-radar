# Pre-commit hooks for ai-radar.
# Uses local hooks via `uv run` so all checks use the project's pinned versions.
#
# Install:  uv sync --group dev && uv run pre-commit install
# Run all:  uv run pre-commit run --all-files

repos:
  - repo: local
    hooks:
      - id: ruff-check
        name: ruff lint
        language: system
        entry: uv run ruff check
        args: [--fix]
        types: [python]
        pass_filenames: true

      - id: ruff-format
        name: ruff format
        language: system
        entry: uv run ruff format
        types: [python]
        pass_filenames: true

      - id: mypy
        name: mypy typecheck
        language: system
        entry: uv run mypy
        args: [radar/]
        pass_filenames: false
        always_run: true
