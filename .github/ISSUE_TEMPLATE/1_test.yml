name: "[TEST] Write Tests"
description: "Write the test file for a module. All tests must fail (red) before the paired [IMPL] issue is opened."
title: "[TEST] "
labels: ["test", "tdd-red"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## TDD Protocol
        This issue produces a **failing test file**. No implementation code.
        Tests must be red before the paired `[IMPL]` issue is created.
        
        > **Playbook note:** The test file is the acceptance criteria. It is the
        > executable specification of "done." If a behavior isn't tested, it isn't
        > required. Write tests with that weight in mind.

  - type: input
    id: module
    attributes:
      label: Module
      description: "The module under test. Match the file path exactly."
      placeholder: "radar/processing/pre_filter.py"
    validations:
      required: true

  - type: input
    id: test_file
    attributes:
      label: Test File to Create
      description: "Where the test file will live."
      placeholder: "tests/unit/test_pre_filter.py"
    validations:
      required: true

  - type: input
    id: spec_ref
    attributes:
      label: Spec Reference
      description: "Section(s) of SPEC.md that define the behavior being tested."
      placeholder: "SPEC.md §3.2 step 6, §3.7 (failure handling)"
    validations:
      required: true

  - type: textarea
    id: pipeline_context
    attributes:
      label: Pipeline Context
      description: "What stage is this? What does it receive and produce? Copy from SPEC.md §4.2 if applicable."
      placeholder: |
        Stage: Pre-Filter (step 4 of preprocessing)
        Receives: list[ExcerptItem] (after Phase 1 dedup)
        Produces: list[ExcerptItem] (filtered subset)
        Position: between Deduplicator (Phase 2) and Summarizer (Pass 1)
    validations:
      required: true

  - type: textarea
    id: happy_path
    attributes:
      label: Happy Path Tests
      description: "List each happy path case. One line per test. Be specific about inputs and expected outputs."
      placeholder: |
        - Articles where ANY keyword matches title → pass through
        - Articles where ANY keyword matches excerpt → pass through
        - Matching is case-insensitive (keyword "AI" matches "ai", "AI", "Ai")
        - Returns subset of original list, preserving order
        - Returns all items if all match
    validations:
      required: true

  - type: textarea
    id: failure_modes
    attributes:
      label: Failure Mode Tests
      description: "One test per failure mode from SPEC.md §3.7 that applies to this module. If none apply directly, write N/A and explain."
      placeholder: |
        - Empty input list → returns [] (never raises)
        - No articles match any keyword → returns []
        - All articles match → returns full list unchanged
        - Single-character keyword (e.g. "a") → matches only if substring of title/excerpt
    validations:
      required: true

  - type: textarea
    id: contract_tests
    attributes:
      label: Interface / Contract Tests
      description: "If this module implements a public interface (Source ABC, LLMClient), list the contract tests. Otherwise write N/A."
      placeholder: |
        N/A — PreFilter is an internal processing stage, not a public interface.
    validations:
      required: true

  - type: textarea
    id: fixtures
    attributes:
      label: Fixtures Required
      description: "List any fixture files or conftest.py helpers this test file needs. Note if they already exist or need to be created."
      placeholder: |
        New fixtures needed:
        - tests/fixtures/excerpt_items_mixed.py — factory for list[ExcerptItem] with varied content
        
        Existing fixtures usable:
        - conftest.py: sample_config (already exists)
    validations:
      required: true

  - type: textarea
    id: mocking
    attributes:
      label: Mocking Strategy
      description: "What external dependencies need to be mocked? How?"
      placeholder: |
        None — PreFilter is pure logic (no I/O, no network, no LLM).
        Use real ExcerptItem dataclass instances as input.
    validations:
      required: true

  - type: textarea
    id: done_when
    attributes:
      label: Done When
      description: "Acceptance criteria for THIS issue (not the implementation). The test file is done when:"
      value: |
        - [ ] Test file exists at the path specified above
        - [ ] All tests in the file FAIL (red) — no implementation exists yet
        - [ ] Every happy path case has at least one test
        - [ ] Every failure mode has at least one test
        - [ ] Empty input case is covered
        - [ ] `make lint` passes on the test file itself (no syntax errors, typed fixtures)
        - [ ] Test names are descriptive: `test_pre_filter_passes_on_keyword_in_excerpt`
        - [ ] Paired `[IMPL]` issue is linked below before closing this issue
    validations:
      required: true

  - type: input
    id: impl_issue
    attributes:
      label: Paired [IMPL] Issue
      description: "Link to the paired implementation issue. Create it and add the number here before closing this [TEST] issue (see Done When above)."
      placeholder: "#42"
    validations:
      required: false

  - type: markdown
    attributes:
      value: |
        ---
        **Agent instructions:** 
        1. Read `CLAUDE.md` and `SPEC.md` at the sections referenced above before writing any code.
        2. Write the test file only. Do not create or modify any file in `radar/`.
        3. Run `make test-unit` — confirm all new tests fail for the right reason: the implementation does not exist yet (expected failures: `ModuleNotFoundError`, `AttributeError`, `TypeError`, or `ImportError` — not assertion errors, which would mean implementation already exists).
        4. Run `make lint` — confirm the test file is clean.
        5. Create the paired `[IMPL]` issue and add its number in the field above before closing this issue.
